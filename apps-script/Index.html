<!DOCTYPE html>
<html lang="zh-Hant">
<!-- update by Leo 2026-04-28 & Apps Script Web App 前端 UI -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台股籌碼掃描雷達</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- bootstrap-table -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.23.5/dist/bootstrap-table.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    body { font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; background: #f8f9fa; }
    .header-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
    .score-high { color: #198754; font-weight: bold; }
    .score-mid  { color: #fd7e14; font-weight: bold; }
    .score-low  { color: #6c757d; }
    .filter-badge { font-size: 0.8rem; }
    .change-up   { color: #dc3545; }
    .change-down { color: #198754; }
    #scan-table th { white-space: nowrap; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header-card p-4 mb-4">
  <div class="container">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h3 class="mb-1">📡 台股籌碼掃描雷達</h3>
        <small id="info-line" class="text-white-50">載入中...</small>
      </div>
      <div class="d-flex align-items-center gap-2">
        <label for="date-select" class="text-white-50 mb-0">切換日期</label>
        <select id="date-select" class="form-select form-select-sm" style="width:180px;" disabled>
          <option value="">最新</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Filter badges -->
<div class="container mb-3">
  <div id="filter-badges"></div>
</div>

<!-- Table -->
<div class="container mb-5">
  <table id="scan-table"
         data-toggle="table"
         data-search="true"
         data-search-align="left"
         data-sort-name="total_score"
         data-sort-order="desc"
         data-pagination="true"
         data-page-size="20"
         data-pagination-h-align="left"
         data-show-columns="true"
         data-locale="zh-TW"
         class="table table-sm table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <!-- update by Leo 2026-04-29 & 新增融資融券+外資+成交量欄位 -->
        <th data-field="rank" data-sortable="true" data-halign="center" data-align="center">#</th>
        <th data-field="stock_id" data-sortable="true">代號</th>
        <th data-field="name" data-sortable="true">名稱</th>
        <th data-field="price" data-sortable="true" data-align="right" data-formatter="priceFormatter">現價</th>
        <th data-field="change" data-sortable="true" data-align="right" data-formatter="changeFormatter">漲跌</th>
        <th data-field="inv_buy_lots" data-sortable="true" data-align="right" data-formatter="lotsFormatter">投信(張)</th>
        <th data-field="main_force_lots" data-sortable="true" data-align="right" data-formatter="lotsFormatter">主力(張)</th>
        <th data-field="foreign_buy_lots" data-sortable="true" data-align="right" data-formatter="lotsFormatter">外資(張)</th>
        <th data-field="consecutive_days" data-sortable="true" data-align="center">投信連買</th>
        <th data-field="foreign_consecutive" data-sortable="true" data-align="center">外資連買</th>
        <th data-field="margin_change" data-sortable="true" data-align="right" data-formatter="marginFormatter">融資增減</th>
        <th data-field="short_margin_ratio" data-sortable="true" data-align="right" data-formatter="ratioFormatter">券資比</th>
        <th data-field="gain_20d" data-sortable="true" data-align="right" data-formatter="pctFormatter">20日漲幅</th>
        <th data-field="vol_ratio_5" data-sortable="true" data-align="right" data-formatter="volRatioFormatter" data-visible="false">量/5MA</th>
        <th data-field="vol_ratio_20" data-sortable="true" data-align="right" data-formatter="volRatioFormatter" data-visible="false">量/20MA</th>
        <th data-field="revenue_yoy" data-sortable="true" data-align="right" data-formatter="yoyFormatter" data-visible="false">營收YoY</th>
        <th data-field="eps" data-sortable="true" data-align="right" data-visible="false">季EPS</th>
        <th data-field="chip_score" data-sortable="true" data-align="right" data-formatter="scoreFormatter">籌碼</th>
        <th data-field="margin_score" data-sortable="true" data-align="right" data-formatter="scoreFormatter">融資</th>
        <th data-field="tech_score" data-sortable="true" data-align="right" data-formatter="scoreFormatter">技術</th>
        <th data-field="volume_score" data-sortable="true" data-align="right" data-formatter="scoreFormatter" data-visible="false">量能</th>
        <th data-field="fundamental_score" data-sortable="true" data-align="right" data-formatter="scoreFormatter" data-visible="false">基本面</th>
        <th data-field="total_score" data-sortable="true" data-align="right" data-formatter="totalScoreFormatter">總分</th>
      </tr>
    </thead>
  </table>
</div>

<!-- Footer -->
<footer class="text-center text-muted py-3" style="font-size:0.85rem;">
  ⚠️ 本資訊純為籌碼分析整理，不構成投資建議。資料來源：TWSE / HiStock / Goodinfo
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.23.5/dist/bootstrap-table.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.23.5/dist/locale/bootstrap-table-zh-TW.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// =====================================================================
// Formatters for bootstrap-table
// =====================================================================
function priceFormatter(value) {
  return value != null ? Number(value).toFixed(2) : '-';
}

function changeFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n > 0 ? 'change-up' : n < 0 ? 'change-down' : '';
  var sign = n > 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + n.toFixed(2) + '</span>';
}

function lotsFormatter(value) {
  if (value == null) return '-';
  return Number(value).toLocaleString('zh-TW', { maximumFractionDigits: 0 });
}

function pctFormatter(value) {
  if (value == null) return '-';
  var pct = (Number(value) * 100).toFixed(2);
  return pct + '%';
}

function yoyFormatter(value) {
  if (value == null) return '-';
  return Number(value).toFixed(1) + '%';
}

// update by Leo 2026-04-29 & 新增融資融券+成交量 formatters
function marginFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n < 0 ? 'score-high' : n > 0 ? 'change-up' : '';
  var sign = n > 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + n.toLocaleString('zh-TW') + '</span>';
}

function ratioFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n >= 30 ? 'change-up' : n >= 20 ? 'score-mid' : '';
  return '<span class="' + cls + '">' + n.toFixed(1) + '%</span>';
}

function volRatioFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n <= 0.5 ? 'score-high' : n >= 2.0 ? 'change-up' : '';
  return '<span class="' + cls + '">' + n.toFixed(2) + 'x</span>';
}

function scoreFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n >= 80 ? 'score-high' : n >= 60 ? 'score-mid' : 'score-low';
  return '<span class="' + cls + '">' + n.toFixed(1) + '</span>';
}

function totalScoreFormatter(value) {
  if (value == null) return '-';
  var n = Number(value);
  var cls = n >= 80 ? 'score-high' : n >= 60 ? 'score-mid' : 'score-low';
  return '<span class="' + cls + '" style="font-size:1.05em">' + n.toFixed(1) + '</span>';
}

// =====================================================================
// Data loading
// =====================================================================
function loadData(date) {
  Swal.fire({ title: '載入中...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });

  google.script.run
    .withSuccessHandler(function(result) {
      Swal.close();
      if (result.error) {
        Swal.fire('���誤', result.error, 'error');
        return;
      }
      renderData(result);
    })
    .withFailureHandler(function(err) {
      Swal.close();
      Swal.fire('錯誤', err.message || '未知錯誤', 'error');
    })
    .getScanData(date || null);
}

function renderData(data) {
  // Info line
  var info = '掃描日期：' + (data.scan_date_display || '-') +
             '　　更新時間：' + (data.updated_at || '-') +
             '　　候選股數：' + (data.count || 0);
  document.getElementById('info-line').textContent = info;

  // Filter badges
  var f = data.filters || {};
  var badges = '';
  if (f.min_investment_trust_buy) badges += '<span class="badge bg-info filter-badge me-1">投信 ≥ ' + f.min_investment_trust_buy + ' 張</span>';
  if (f.min_main_force_buy) badges += '<span class="badge bg-info filter-badge me-1">主力 ≥ ' + f.min_main_force_buy + ' 張</span>';
  if (f.consecutive_buy_days) badges += '<span class="badge bg-warning text-dark filter-badge me-1">連買 ≥ ' + f.consecutive_buy_days + ' 天</span>';
  if (f.chip_match_mode) badges += '<span class="badge bg-secondary filter-badge me-1">模式：' + f.chip_match_mode + '</span>';
  document.getElementById('filter-badges').innerHTML = badges;

  // Table
  var $table = $('#scan-table');
  $table.bootstrapTable('load', data.stocks || []);
}

// =====================================================================
// Init
// =====================================================================
$(function() {
  // Load date dropdown
  google.script.run
    .withSuccessHandler(function(dates) {
      var sel = document.getElementById('date-select');
      sel.innerHTML = '<option value="">最新</option>';
      (dates || []).forEach(function(d) {
        var opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        sel.appendChild(opt);
      });
      sel.disabled = false;
    })
    .getDates();

  // Date selector change
  document.getElementById('date-select').addEventListener('change', function() {
    loadData(this.value);
  });

  // Initial load (latest)
  loadData(null);
});
</script>

</body>
</html>
